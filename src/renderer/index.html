<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'" />
  <title>LaTeX → MathType Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #a0c4ff;
      letter-spacing: 0.5px;
    }

    /* ── Drop zone ── */
    #drop-zone {
      width: 560px;
      height: 160px;
      border: 2px dashed #3a3a6a;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #16213e;
    }

    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #6c8ebf;
      background: #1c2a50;
    }

    #drop-zone .icon { font-size: 36px; }
    #drop-zone .label { font-size: 14px; color: #8898b8; }
    #drop-zone .filename {
      font-size: 13px;
      color: #a0c4ff;
      font-weight: 500;
      max-width: 500px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Controls ── */
    #controls {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #btn-select { background: #2a4a7f; color: #c8d8f0; }
    #btn-convert { background: #1e7a4a; color: #c8f0d8; }
    #btn-convert:not(:disabled):hover { background: #22915a; }
    #btn-select:not(:disabled):hover { background: #2f5a99; }

    /* ── Progress panel ── */
    #progress-panel {
      width: 560px;
      background: #16213e;
      border-radius: 10px;
      padding: 16px 20px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    #progress-panel.visible { display: flex; }

    #progress-bar-track {
      height: 6px;
      background: #2a2a4a;
      border-radius: 3px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2e86de, #54a0ff);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    #progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #6a82a8;
    }

    #progress-status {
      font-size: 13px;
      color: #a0b8d8;
    }

    #status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-scanning  { background: #2a4a7f; color: #80aaff; }
    .badge-converting{ background: #2a5a3f; color: #80ffaa; }
    .badge-replacing { background: #5a4a2a; color: #ffc080; }
    .badge-zipping   { background: #4a2a5a; color: #c080ff; }
    .badge-done      { background: #1a4a2a; color: #40ff80; }
    .badge-error     { background: #5a1a1a; color: #ff8080; }

    #result-row {
      display: flex;
      gap: 20px;
      font-size: 13px;
    }

    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat .val { font-size: 22px; font-weight: 700; }
    .stat .lbl { font-size: 11px; color: #6a82a8; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-total .val  { color: #80aaff; }
    .stat-ok    .val  { color: #40cc80; }
    .stat-fail  .val  { color: #cc5050; }
    .stat-time  .val  { color: #c0a040; }

    #error-msg {
      font-size: 12px;
      color: #ff8888;
      margin-top: 4px;
      display: none;
    }

    #warning-msg {
      font-size: 12px;
      color: #ffc87a;
      margin-top: 4px;
      display: none;
    }

    #success-row {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #80d8a0;
    }

    #btn-open-folder {
      background: none;
      border: 1px solid #3a6a50;
      color: #80d8a0;
      font-size: 12px;
      padding: 4px 12px;
    }
    #btn-open-folder:hover { background: #1a3a2a; }
  </style>
</head>
<body>
  <h1>LaTeX → MathType Converter</h1>

  <div id="drop-zone">
    <div class="icon">📄</div>
    <div class="label">Drop a .docx file here or click to browse</div>
    <div class="filename" id="filename-label"></div>
  </div>

  <div id="controls">
    <button id="btn-select">Browse file</button>
    <button id="btn-convert" disabled>Convert</button>
  </div>

  <div id="progress-panel">
    <div style="display:flex; align-items:center; gap:10px;">
      <span id="status-badge" class="badge-scanning">Scanning</span>
      <span id="progress-status">Scanning document…</span>
    </div>
    <div id="progress-bar-track">
      <div id="progress-bar"></div>
    </div>
    <div id="progress-stats">
      <span id="stat-converted">0 converted</span>
      <span id="stat-failed">0 failed</span>
      <span id="stat-total">0 total</span>
    </div>

    <div id="result-row" style="display:none">
      <div class="stat stat-total">
        <div class="val" id="res-total">0</div>
        <div class="lbl">Total</div>
      </div>
      <div class="stat stat-ok">
        <div class="val" id="res-converted">0</div>
        <div class="lbl">Converted</div>
      </div>
      <div class="stat stat-fail">
        <div class="val" id="res-failed">0</div>
        <div class="lbl">Failed</div>
      </div>
      <div class="stat stat-time">
        <div class="val" id="res-time">—</div>
        <div class="lbl">ms</div>
      </div>
    </div>

    <div id="error-msg"></div>
    <div id="warning-msg"></div>

    <div id="success-row">
      ✔ Saved to output file
      <button id="btn-open-folder">Show in folder</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
